<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Krave Admin Portal</title>
  <meta name="description" content="Industry-ready admin portal for the Krave canteen management platform." />
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍽️</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="css/styles.css" />
  <!-- Chart.js for analytics -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</head>

<body>

  <!-- ─── Auth Screen ─── -->
  <div id="auth-screen">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-mark">K</div>
        <div class="logo-text"><span>Krave</span> Admin</div>
      </div>
      <div class="auth-subtitle">🔒 Restricted access. Admin credentials required.</div>

      <div id="auth-error" class="auth-error"></div>

      <form id="login-form" autocomplete="on">
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input id="email" class="form-input" type="email" placeholder="kraveadmin@gmail.com" autocomplete="email"
            required />
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input id="password" class="form-input" type="password" placeholder="••••••••••"
            autocomplete="current-password" required />
        </div>
        <button id="login-btn" class="btn btn-primary" type="submit"
          style="width:100%;justify-content:center;padding:14px;font-size:15px;margin-top:8px">
          Sign In as Admin
        </button>
      </form>
    </div>
  </div>

  <!-- ─── App Shell ─── -->
  <div id="app" style="display:none">

    <!-- Sidebar -->
    <nav id="sidebar">
      <div class="sidebar-brand">
        <div class="brand-mark">K</div>
        <div class="brand-name"><span>Krave</span> Admin</div>
        <div class="brand-badge">v1.0</div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-section-label">Main</div>
        <a class="nav-link" data-route="dashboard" href="#dashboard">
          <span class="nav-icon">📊</span> Dashboard
        </a>
        <a class="nav-link" data-route="analytics" href="#analytics">
          <span class="nav-icon">📈</span> Analytics
        </a>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-section-label">Management</div>
        <a class="nav-link" data-route="approvals" href="#approvals">
          <span class="nav-icon">✅</span> Owner Approvals
          <span class="nav-badge" id="nav-badge-approvals" style="display:none">0</span>
        </a>
        <a class="nav-link" data-route="canteens" href="#canteens">
          <span class="nav-icon">🏪</span> Manage Canteens
        </a>
        <a class="nav-link" data-route="users" href="#users">
          <span class="nav-icon">👥</span> Manage Users
        </a>
        <a class="nav-link" data-route="riders" href="#riders">
          <span class="nav-icon">🛵</span> Manage Riders
        </a>
        <a class="nav-link" data-route="orders" href="#orders">
          <span class="nav-icon">📦</span> All Orders
        </a>
      </div>

      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="user-avatar-text">A</div>
          <div class="user-details">
            <div class="user-name" id="user-name-text">Admin</div>
            <div class="user-role" id="user-role-text">Administrator</div>
          </div>
        </div>
        <button id="logout-btn" class="btn btn-ghost" style="width:100%;justify-content:center;gap:8px;font-size:13px">
          🚪 Sign Out
        </button>
      </div>
    </nav>

    <!-- Main Shell -->
    <div id="shell">
      <!-- Topbar -->
      <header id="topbar">
        <div id="page-title">Dashboard</div>
        <span class="topbar-meta">🕐 <span id="topbar-clock">—</span></span>
      </header>

      <!-- Content -->
      <main id="main-content">
        <div class="page-loading">
          <div class="spinner"></div>
        </div>
      </main>
    </div>
  </div>

  <!-- ─── Confirm Modal ─── -->
  <div class="modal-overlay" id="confirm-modal">
    <div class="modal-box">
      <div class="modal-title" id="confirm-modal-title">Confirm Action</div>
      <div class="modal-message" id="confirm-modal-message">Are you sure?</div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="confirm-modal-cancel">Cancel</button>
        <button class="btn btn-danger" id="confirm-modal-btn">Confirm</button>
      </div>
    </div>
  </div>

  <!-- ─── App Script ─── -->
  <script type="module" src="js/app.js"></script>
</body>

</html>
