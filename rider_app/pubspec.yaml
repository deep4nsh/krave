name: rider_app
description: "Krave Rider App — delivery rider companion for Krave canteen platform."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  krave:
    path: ../

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3

  # State management
  provider: ^6.1.2

  # Utils
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  google_fonts: ^6.2.1
  pinput: ^6.0.2
  image_picker: ^1.2.1
  firebase_storage: ^12.4.10
  lottie: ^3.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
